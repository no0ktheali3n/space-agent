examples:
  - text: Create a weather report
    prompt: Create a weather report. Use https://ipapi.co/json/ to get an approximate location. Do not use exact browser geolocation. Fetch weather from https://api.met.no/weatherapi/locationforecast/2.0/compact. Use the `pdf-report` skill to create and download a browser PDF report with structure and styling chosen for this report instead of a canned template, then reply with a brief weather summary.
    kind: chat
    icon: chat_bubble
    color: "#7dc6ff"
    code: |
      await helpers.submitPrompt(example.prompt)
  - text: Retro Arcade
    kind: widget
    icon: gamepad
    color: "#00ffd5"
    code: |
      const currentSpace = helpers.getSpaceRuntime().current
      const spacesRuntime = helpers.getSpacesRuntime()
      const shouldRenameSpace = currentSpace && !String(currentSpace.title || "").trim()
      if (shouldRenameSpace && currentSpace?.id) {
        await spacesRuntime.saveSpaceMeta({ id: currentSpace.id, title: example.text, refresh: false })
      }
      await helpers.installOnboardingExampleWidgets([
        "retro-arcade/tetris-game.yaml",
        "retro-arcade/minesweeper-game.yaml",
        "retro-arcade/snake-game.yaml",
        "retro-arcade/retro-marquee.yaml"
      ])
