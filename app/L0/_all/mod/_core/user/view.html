<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/user/user.css" />
    <script type="module" src="/mod/_core/user/store.js"></script>
  </head>
  <body>
    <section class="user-page" x-data x-init="$store.userPage.init()">
      <div class="user-page-shell">
        <div class="user-page-grid">
          <article class="space-card user-page-card user-page-summary-card">
            <div class="user-page-summary-badge">
              <x-icon>manage_accounts</x-icon>
              <span>Account</span>
            </div>

            <div class="user-page-summary-head">
              <h1 x-text="$store.userPage.displayFullName"></h1>
              <p
                class="user-page-handle"
                x-text="$store.userPage.username ? `@${$store.userPage.username}` : '@user'"
              ></p>
            </div>

            <p class="user-page-summary-copy">
              Keep your account details up to date and change your sign-in password when needed.
            </p>

            <div class="user-page-chip-section">
              <p class="page-eyebrow">Groups</p>
              <div class="user-page-chip-list">
                <template x-if="$store.userPage.groups.length === 0">
                  <span class="user-page-chip is-muted">None</span>
                </template>
                <template x-for="group in $store.userPage.groups" :key="`group:${group}`">
                  <span class="user-page-chip" x-text="group"></span>
                </template>
              </div>
            </div>

            <div class="user-page-chip-section">
              <p class="page-eyebrow">Managed Groups</p>
              <div class="user-page-chip-list">
                <template x-if="$store.userPage.managedGroups.length === 0">
                  <span class="user-page-chip is-muted">None</span>
                </template>
                <template
                  x-for="group in $store.userPage.managedGroups"
                  :key="`managed-group:${group}`"
                >
                  <span class="user-page-chip" x-text="group"></span>
                </template>
              </div>
            </div>
          </article>

          <div class="user-page-settings-column">
            <article class="space-card user-page-card user-page-section-card">
              <div class="user-page-section-header">
                <h2>Profile</h2>
                <p>Choose the name shown for your account.</p>
              </div>

              <label class="field">
                <span>Full Name</span>
                <input
                  type="text"
                  x-model="$store.userPage.fullNameDraft"
                  :disabled="$store.userPage.loading || $store.userPage.profileSaving || $store.userPage.reauthPending"
                  autocomplete="name"
                  placeholder="Your full name"
                />
              </label>

              <div class="dialog-actions user-page-actions">
                <button
                  type="button"
                  class="secondary-button user-page-compact-button"
                  :disabled="$store.userPage.loading || $store.userPage.profileSaving || $store.userPage.passwordSaving || $store.userPage.reauthPending"
                  @click="$store.userPage.reloadProfile()"
                >
                  <x-icon x-text="$store.userPage.loading ? 'hourglass_top' : 'refresh'"></x-icon>
                  <span>Reload</span>
                </button>

                <button
                  type="button"
                  class="primary-button user-page-compact-button"
                  :disabled="$store.userPage.loading || $store.userPage.profileSaving || $store.userPage.reauthPending || !$store.userPage.isFullNameDirty"
                  @click="$store.userPage.saveFullName()"
                >
                  <x-icon x-text="$store.userPage.profileSaving ? 'hourglass_top' : 'save'"></x-icon>
                  <span x-text="$store.userPage.profileSaving ? 'Saving…' : 'Save'"></span>
                </button>
              </div>

              <p
                class="user-page-status"
                :class="{
                  'is-error': $store.userPage.profileStatusTone === 'error',
                  'is-success': $store.userPage.profileStatusTone === 'success'
                }"
                x-text="$store.userPage.profileStatusText"
              ></p>
            </article>

            <article class="space-card user-page-card user-page-section-card">
              <div class="user-page-section-header">
                <h2>Password</h2>
                <p>Change the password you use to sign in.</p>
              </div>

              <template x-if="$store.userPage.singleUserApp">
                <p class="field-note user-page-inline-note">
                  Password sign-in is not used here, so there is nothing to change.
                </p>
              </template>

              <template x-if="!$store.userPage.singleUserApp">
                <div class="user-page-password-fields">
                  <label class="field">
                    <span>Current Password</span>
                    <input
                      type="password"
                      x-model="$store.userPage.passwordCurrent"
                      :disabled="$store.userPage.passwordSaving || $store.userPage.reauthPending"
                      autocomplete="current-password"
                      @keydown.enter.prevent="$store.userPage.changePassword()"
                    />
                  </label>

                  <label class="field">
                    <span>New Password</span>
                    <input
                      type="password"
                      x-model="$store.userPage.passwordNew"
                      :disabled="$store.userPage.passwordSaving || $store.userPage.reauthPending"
                      autocomplete="new-password"
                      @keydown.enter.prevent="$store.userPage.changePassword()"
                    />
                  </label>

                  <label class="field">
                    <span>Confirm New Password</span>
                    <input
                      type="password"
                      x-model="$store.userPage.passwordConfirm"
                      :disabled="$store.userPage.passwordSaving || $store.userPage.reauthPending"
                      autocomplete="new-password"
                      @keydown.enter.prevent="$store.userPage.changePassword()"
                    />
                  </label>

                  <p
                    class="field-note user-page-password-match-note"
                    :class="{ 'is-error': $store.userPage.passwordMismatch }"
                    x-text="
                      $store.userPage.passwordMismatch
                        ? 'New password and confirmation must match.'
                        : 'Changing your password will sign you out everywhere, including this browser.'
                    "
                  ></p>

                  <div class="dialog-actions user-page-actions">
                    <button
                      type="button"
                      class="secondary-button user-page-compact-button"
                      :disabled="$store.userPage.passwordSaving || $store.userPage.reauthPending || (!$store.userPage.passwordCurrent && !$store.userPage.passwordNew && !$store.userPage.passwordConfirm)"
                      @click="$store.userPage.clearPasswordForm()"
                    >
                      <x-icon>close</x-icon>
                      <span>Clear</span>
                    </button>

                    <button
                      type="button"
                      class="primary-button user-page-compact-button"
                      :disabled="!$store.userPage.canChangePassword"
                      @click="$store.userPage.changePassword()"
                    >
                      <x-icon x-text="$store.userPage.passwordSaving ? 'hourglass_top' : 'vpn_key'"></x-icon>
                      <span x-text="$store.userPage.passwordSaving ? 'Changing…' : 'Change Password'"></span>
                    </button>
                  </div>
                </div>
              </template>

              <p
                class="user-page-status"
                :class="{
                  'is-error': $store.userPage.passwordStatusTone === 'error',
                  'is-success': $store.userPage.passwordStatusTone === 'success'
                }"
                x-text="$store.userPage.passwordStatusText"
              ></p>
            </article>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
